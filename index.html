<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Aura AR</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 10;
        }

        h1 {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8),
                         0 0 40px rgba(255, 0, 255, 0.5);
            animation: glow 2s ease-in-out infinite;
        }

        p {
            font-size: 1.2rem;
            margin-bottom: 2rem;
            color: #a0a0a0;
        }

        .neon-button {
            display: inline-block;
            padding: 12px 30px;
            margin: 10px;
            border: 2px solid;
            border-image: linear-gradient(135deg, #00ffff, #ff00ff) 1;
            background: rgba(0, 255, 255, 0.1);
            color: #00ffff;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
        }

        .neon-button:hover {
            background: rgba(0, 255, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.8),
                       0 0 30px rgba(255, 0, 255, 0.6);
            transform: scale(1.05);
        }

        @keyframes glow {
            0%, 100% {
                text-shadow: 0 0 20px rgba(0, 255, 255, 0.8),
                            0 0 40px rgba(255, 0, 255, 0.5);
            }
            50% {
                text-shadow: 0 0 30px rgba(0, 255, 255, 1),
                            0 0 60px rgba(255, 0, 255, 0.8),
                            0 0 90px rgba(0, 255, 255, 0.6);
            }
        }

        .background-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: 
                radial-gradient(circle at 20% 50%, rgba(0, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 0, 255, 0.1) 0%, transparent 50%);
            animation: shift 15s ease-in-out infinite;
        }

        @keyframes shift {
            0%, 100% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(20px, 20px);
            }
        }
    </style>
</head>
<body>
    <div class="background-animation"></div>
    <div class="container">
        <h1>✨ Neon Aura AR ✨</h1>
        <p>Experience augmented reality like never before</p>
        <a href="#" class="neon-button">Start AR Experience</a>
        <a href="#" class="neon-button">Learn More</a>
    </div>
</body>
</html>
